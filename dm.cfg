// ============================================================================
// ospw CS:GO — FFA Deathmatch Config (128 Tick)
// ============================================================================
// Executed via: ./start.sh dm
// No plugin needed — uses CS:GO's built-in DM (game_type 1, game_mode 2)
// with mp_teammates_are_enemies 1 for free-for-all.
//
// Deploy to: /srv/csgo-host/csgo/cfg/dm.cfg
// ============================================================================

// ── 128-Tick Rates ──────────────────────────────────────────────────────────
sv_mincmdrate 128
sv_maxcmdrate 128
sv_minupdaterate 128
sv_maxupdaterate 128
sv_minrate 128000
sv_maxrate 0
sv_clockcorrection_msecs 15

// ── FFA Mode ────────────────────────────────────────────────────────────────
mp_teammates_are_enemies 1
mp_autoteambalance 0
mp_limitteams 0

// ── Respawn ─────────────────────────────────────────────────────────────────
mp_respawn_on_death_ct 1
mp_respawn_on_death_t 1
mp_respawnwavetime_ct 1
mp_respawnwavetime_t 1

// ── Round Structure ─────────────────────────────────────────────────────────
mp_roundtime 10
mp_freezetime 0
mp_maxrounds 0
mp_timelimit 10
mp_buytime 9999
mp_buy_anywhere 1
mp_round_restart_delay 3
mp_match_restart_delay 5
mp_ignore_round_win_conditions 1

// ── No halftime / overtime ──────────────────────────────────────────────────
mp_halftime 0
mp_overtime_enable 0

// ── Equipment ───────────────────────────────────────────────────────────────
mp_free_armor 1
mp_startmoney 16000
sv_infinite_ammo 2
mp_death_drop_grenade 0
mp_death_drop_gun 1
mp_death_drop_defuser 0
mp_weapons_allow_map_placed 1

// ── Economy (disabled — everything free) ────────────────────────────────────
mp_playercashawards 0
mp_teamcashawards 0

// ── Warmup ──────────────────────────────────────────────────────────────────
mp_warmup_pausetimer 0
mp_warmuptime 10

// ── Anti-Cheat ──────────────────────────────────────────────────────────────
sv_cheats 0
sv_pure 1

// ── Communication ───────────────────────────────────────────────────────────
sv_alltalk 1
sv_deadtalk 1
sv_full_alltalk 1

// ── Misc ────────────────────────────────────────────────────────────────────
sv_allow_votes 1
mp_display_kill_assists 1
sv_kick_ban_duration 0
spec_freeze_time 0
mp_win_panel_display_time 2
mp_friendlyfire 0
bot_quota 0
