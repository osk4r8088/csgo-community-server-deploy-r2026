// ============================================================================
// ospw CS:GO — Casual Server Config (128 Tick)
// ============================================================================
// Auto-executed on map change when running casual mode (game_type 0, game_mode 0).
// Used as a base for surf and KZ modes — the mode-specific .cfg (surf.cfg, kz.cfg)
// is executed afterwards via +exec in start.sh and overrides these settings.
//
// Deploy to: /srv/csgo-host/csgo/cfg/gamemode_casual_server.cfg
// ============================================================================

// ── 128-Tick Rates ──────────────────────────────────────────────────────────
sv_mincmdrate 128
sv_maxcmdrate 128
sv_minupdaterate 128
sv_maxupdaterate 128
sv_minrate 128000
sv_maxrate 0
sv_clockcorrection_msecs 15

// ── Round Structure ─────────────────────────────────────────────────────────
mp_roundtime 60
mp_freezetime 0
mp_buytime 0
mp_maxrounds 0
mp_timelimit 0
mp_ignore_round_win_conditions 1

// ── Team Balance ────────────────────────────────────────────────────────────
mp_autoteambalance 0
mp_limitteams 0

// ── Gameplay ────────────────────────────────────────────────────────────────
mp_friendlyfire 0
mp_free_armor 1
mp_respawn_on_death_ct 1
mp_respawn_on_death_t 1
mp_respawnwavetime_ct 0
mp_respawnwavetime_t 0

// ── Economy (disabled) ──────────────────────────────────────────────────────
mp_startmoney 0
mp_playercashawards 0
mp_teamcashawards 0

// ── Anti-Cheat ──────────────────────────────────────────────────────────────
sv_cheats 0
sv_pure 1

// ── Communication ───────────────────────────────────────────────────────────
sv_alltalk 1
sv_deadtalk 1
sv_full_alltalk 1
