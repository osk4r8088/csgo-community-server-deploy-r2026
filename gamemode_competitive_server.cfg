// ============================================================================
// ospw CS:GO — Competitive Server Config (128 Tick)
// ============================================================================
// This file is auto-executed on every map change in competitive mode
// (game_type 0, game_mode 1). It runs AFTER Valve's gamemode_competitive.cfg
// to override defaults with our 128-tick competitive settings.
//
// Deploy to: /srv/csgo-host/csgo/cfg/gamemode_competitive_server.cfg
// ============================================================================

// ── 128-Tick Rate Settings ──────────────────────────────────────────────────
// Requires -tickrate 128 in start.sh launch parameters
sv_mincmdrate 128
sv_maxcmdrate 128
sv_minupdaterate 128
sv_maxupdaterate 128
sv_minrate 128000
sv_maxrate 0
sv_clockcorrection_msecs 15

// ── Round Structure ─────────────────────────────────────────────────────────
mp_maxrounds 30
mp_roundtime 1.92
mp_roundtime_defuse 1.92
mp_roundtime_hostage 1.92
mp_c4timer 40
mp_freezetime 5
mp_buytime 15
mp_round_restart_delay 5
mp_match_restart_delay 15

// ── Half / Overtime ─────────────────────────────────────────────────────────
mp_halftime 1
mp_halftime_pausetimer 0
mp_overtime_enable 1
mp_overtime_maxrounds 6
mp_overtime_startmoney 10000

// ── Economy ─────────────────────────────────────────────────────────────────
mp_startmoney 800
mp_afterroundmoney 0
mp_playercashawards 1
mp_teamcashawards 1
cash_team_bonus_shorthanded 0

// ── Team Balance ────────────────────────────────────────────────────────────
mp_autoteambalance 1
mp_limitteams 1

// ── Gameplay ────────────────────────────────────────────────────────────────
mp_friendlyfire 0
mp_death_drop_grenade 1
mp_death_drop_gun 1
mp_death_drop_defuser 1
mp_defuser_allocation 0

// ── Warmup ──────────────────────────────────────────────────────────────────
mp_warmup_pausetimer 1
mp_endwarmup_player_count 2
mp_warmuptime 60

// ── Anti-Cheat ──────────────────────────────────────────────────────────────
sv_cheats 0
sv_pure 1
sv_kick_ban_duration 0

// ── Communication ───────────────────────────────────────────────────────────
sv_alltalk 0
sv_deadtalk 1
sv_full_alltalk 0

// ── Misc ────────────────────────────────────────────────────────────────────
sv_allow_votes 1
mp_weapons_allow_map_placed 1
mp_display_kill_assists 1
mp_respawn_on_death_ct 0
mp_respawn_on_death_t 0
spec_freeze_time 3
mp_win_panel_display_time 3
