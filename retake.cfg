// ============================================================================
// ospw CS:GO — Retake Mode Config (128 Tick)
// ============================================================================
// Executed via: ./start.sh retake
// Plugin required: splewis/csgo-retakes + retakes_standardallocator
//
// Deploy to: /srv/csgo-host/csgo/cfg/retake.cfg
// ============================================================================

// ── 128-Tick Rates ──────────────────────────────────────────────────────────
sv_mincmdrate 128
sv_maxcmdrate 128
sv_minupdaterate 128
sv_maxupdaterate 128
sv_minrate 128000
sv_maxrate 0
sv_clockcorrection_msecs 15

// ── Round Structure ─────────────────────────────────────────────────────────
// The retakes plugin manages most round logic, but these cvars still apply
mp_roundtime 0.5
mp_roundtime_defuse 0.5
mp_c4timer 40
mp_freezetime 0
mp_buytime 0
mp_round_restart_delay 2
mp_match_restart_delay 5

// ── No halftime / overtime in retakes ───────────────────────────────────────
mp_maxrounds 0
mp_halftime 0
mp_overtime_enable 0

// ── Team Balance ────────────────────────────────────────────────────────────
// Retakes plugin handles team assignment (5 CT vs 4 T)
mp_autoteambalance 0
mp_limitteams 0

// ── Gameplay ────────────────────────────────────────────────────────────────
mp_friendlyfire 1
mp_death_drop_grenade 0
mp_death_drop_gun 1
mp_death_drop_defuser 1
mp_defuser_allocation 0

// ── Warmup ──────────────────────────────────────────────────────────────────
mp_warmup_pausetimer 1
mp_endwarmup_player_count 2
mp_warmuptime 60

// ── Anti-Cheat ──────────────────────────────────────────────────────────────
sv_cheats 0
sv_pure 1

// ── Communication ───────────────────────────────────────────────────────────
sv_alltalk 0
sv_deadtalk 1
sv_full_alltalk 0

// ── Misc ────────────────────────────────────────────────────────────────────
sv_allow_votes 0
mp_weapons_allow_map_placed 0
mp_display_kill_assists 1
mp_respawn_on_death_ct 0
mp_respawn_on_death_t 0
spec_freeze_time 1
mp_win_panel_display_time 2
