// ospw CS:GO Server Config

// ── Identity ──
hostname "ospw csgo"

// ── Rates (128 tick) ──
sv_maxrate 0
sv_minrate 128000
sv_maxupdaterate 128
sv_minupdaterate 128

// ── Warmup: stay in warmup until 2 players join ──
mp_warmup_pausetimer 1
mp_endwarmup_player_count 2
mp_warmuptime 60

// ── Competitive settings ──
mp_autoteambalance 1
mp_limitteams 1
mp_friendlyfire 0
mp_roundtime 2
mp_freezetime 5
mp_buytime 15
mp_startmoney 800
mp_maxrounds 30
mp_halftime 1
mp_match_restart_delay 15

// ── Anti-cheat ──
sv_cheats 0
sv_pure 1

// ── Logging (for future stats dashboard) ──
log on
sv_logbans 1
sv_logecho 1
sv_logfile 1
sv_log_onefile 0
mp_logdetail 3
mp_logmoney 1

// ── Network ──
sv_lan 0

// ── RankMe settings ──
// Auto-generated at cfg/sourcemod/kento.rankme.cfg on first run
// Key overrides:
// rankme_minimumplayers 2
// rankme_gather_stats_warmup 0
// rankme_points_start 1000
