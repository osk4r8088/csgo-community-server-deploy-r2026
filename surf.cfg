// ============================================================================
// ospw CS:GO — Surf Mode Config (128 Tick)
// ============================================================================
// Executed via: ./start.sh surf
// Plugin required: SurfTimer (https://github.com/surftimer/SurfTimer)
// Database required: MySQL — entry named "surftimer" in databases.cfg
//
// Deploy to: /srv/csgo-host/csgo/cfg/surf.cfg
// ============================================================================

// ── 128-Tick Rates ──────────────────────────────────────────────────────────
sv_mincmdrate 128
sv_maxcmdrate 128
sv_minupdaterate 128
sv_maxupdaterate 128
sv_minrate 128000
sv_maxrate 0
sv_clockcorrection_msecs 15

// ── Movement (CRITICAL for surf) ────────────────────────────────────────────
sv_airaccelerate 150
sv_accelerate 10
sv_maxvelocity 10000
sv_friction 4
sv_staminajumpcost 0
sv_staminalandcost 0
sv_staminamax 0
sv_staminarecoveryrate 0
sv_enablebunnyhopping 1
sv_autobunnyhopping 0

// ── Round Structure ─────────────────────────────────────────────────────────
mp_roundtime 60
mp_roundtime_defuse 60
mp_roundtime_hostage 60
mp_freezetime 0
mp_buytime 0
mp_maxrounds 0
mp_round_restart_delay 0
mp_match_restart_delay 0
mp_timelimit 0
mp_ignore_round_win_conditions 1

// ── No halftime / overtime ──────────────────────────────────────────────────
mp_halftime 0
mp_overtime_enable 0

// ── Team Balance ────────────────────────────────────────────────────────────
mp_autoteambalance 0
mp_limitteams 0

// ── Gameplay ────────────────────────────────────────────────────────────────
mp_friendlyfire 0
mp_death_drop_grenade 0
mp_death_drop_gun 0
mp_death_drop_defuser 0
mp_free_armor 1
mp_weapons_allow_map_placed 1
mp_respawn_on_death_ct 1
mp_respawn_on_death_t 1
mp_respawnwavetime_ct 0
mp_respawnwavetime_t 0

// ── Economy (disabled) ──────────────────────────────────────────────────────
mp_startmoney 0
mp_playercashawards 0
mp_teamcashawards 0

// ── Warmup ──────────────────────────────────────────────────────────────────
mp_warmup_pausetimer 0
mp_warmuptime 5

// ── Anti-Cheat ──────────────────────────────────────────────────────────────
sv_cheats 0
sv_pure 1

// ── Communication ───────────────────────────────────────────────────────────
sv_alltalk 1
sv_deadtalk 1
sv_full_alltalk 1

// ── Damage ──────────────────────────────────────────────────────────────────
// Prevent players from killing each other on surf
mp_damage_headshot_only 0
mp_damage_scale_ct_body 0
mp_damage_scale_ct_head 0
mp_damage_scale_t_body 0
mp_damage_scale_t_head 0
ff_damage_reduction_grenade 0
ff_damage_reduction_bullets 0
ff_damage_reduction_other 0

// ── Misc ────────────────────────────────────────────────────────────────────
sv_allow_votes 0
mp_display_kill_assists 0
sv_kick_ban_duration 0
sv_infinite_ammo 2
bot_quota 0
